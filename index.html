<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Portfolio — games, links, and contact."
    />
    <meta property="og:title" content="Portfolio" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:type" content="website" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="header">
      <div class="header__inner">
        <img
          id="avatar"
          class="avatar"
          hidden
          alt=""
          width="96"
          height="96"
          loading="eager"
          decoding="async"
        />
        <div class="header__text">
          <h1 id="site-name" class="title">Bianca Palacio</h1>
          <div class="header__social" aria-label="Social and contact">
            <a
              id="footer-linkedin"
              class="icon-link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="LinkedIn profile"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
              </svg>
            </a>
            <a
              id="footer-github"
              class="icon-link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="GitHub profile"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.113.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
                />
              </svg>
            </a>
            <button
              type="button"
              id="email-copy"
              class="icon-link icon-link--btn"
              aria-label="Copy email address"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect width="20" height="16" x="2" y="4" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
              </svg>
            </button>
            <span id="email-copy-feedback" class="email-feedback" hidden>Copied</span>
          </div>
        </div>
      </div>
    </header>

    <main id="main" class="main">
      <section class="section" aria-labelledby="games-heading">
        <h2 id="games-heading" class="section__title">Games</h2>
        <p id="games-lede" class="section__lede">
          Playable builds hosted on GitHub Pages for web and mobile platforms.
        </p>
        <ul id="games-list" class="games"></ul>
      </section>
    </main>

    <footer class="footer">
      <div class="footer__bar">
        <p class="footer__updated" id="footer-last-updated"></p>
      </div>
      <p class="footer__hosted">
        Hosted on
        <a
          href="https://pages.github.com/"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub Pages</a
        >.
      </p>
    </footer>

    <script src="config.js"></script>
    <script>
      /* If config.js fails to load, keep the page working (avatar + games). */
      if (!window.SITE_CONFIG) {
        window.SITE_CONFIG = {
          name: "Bianca Palacio",
          tagline: "Group Product Manager with 10 years in e-commerce",
          githubUsername: "bmpalacio",
          linkedinUrl: "https://www.linkedin.com/in/bpalacio6/",
          email: "bianca.m.palacio@gmail.com",
          lastUpdated: "2026-04-02",
          games: [
            {
              title: "Stay afloat",
              description:
                "Stay afloat as long as you can. The game gets harder over time.",
              url: "https://bmpalacio.github.io/stay-afloat/",
              preview: "previews/stay-afloat.png",
            },
            {
              title: "Hero tower defense",
              description:
                "Defend your hero's tower against incoming enemies.",
              url: "https://bmpalacio.github.io/hero-tower/",
              preview: "previews/hero-tower.png",
            },
            {
              title: "ePuzzle",
              description:
                "Upload any image and decide how many pieces to complete the puzzle.",
              url: "https://bmpalacio.github.io/epuzzle/",
              preview: "previews/epuzzle.png",
            },
          ],
        };
      }
    </script>
    <script src="main.js"></script>
  </body>
</html>
